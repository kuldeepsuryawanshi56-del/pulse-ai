name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgres://pulse:pulse@localhost:5434/pulse
      API_PORT: 3000
      API_HOST: 0.0.0.0
      JWT_SECRET: ci-test-secret-not-real
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run migrations
        run: bun run db:migrate

      - name: Test
        run: bun run test
